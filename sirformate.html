<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voter Mapping — WhatsApp Ready</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: #0B1F3A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    gap: 20px;
  }

  .title-bar {
    text-align: center;
    color: #fff;
  }
  .title-bar h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #FFD580;
  }
  .title-bar p {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }

  /* The WhatsApp message box */
  .wa-box {
    background: #1e2d1f;
    border: 1.5px solid #2e5230;
    border-radius: 16px;
    max-width: 420px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .wa-header {
    background: #25D366;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .wa-header span { font-size: 20px; }
  .wa-header-text { color: white; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
  .wa-header-sub { color: rgba(255,255,255,0.75); font-size: 11px; }

  /* The actual message — pre-formatted, monospace for exact spacing */
  .message-area {
    padding: 16px;
    position: relative;
  }

  #wa-message {
    font-family: 'Courier New', Courier, monospace;
    font-size: 13.5px;
    line-height: 1.7;
    color: #d4edda;
    white-space: pre;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    resize: none;
    overflow: hidden;
    cursor: text;
    caret-color: #25D366;
    /* Make it selectable but look like display */
    user-select: text;
    -webkit-user-select: text;
  }

  /* Copy button */
  .copy-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: calc(100% - 32px);
    margin: 0 16px 16px;
    padding: 14px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: white;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 20px rgba(37,211,102,0.3);
  }
  .copy-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(37,211,102,0.4); }
  .copy-btn:active { transform: scale(0.98); }
  .copy-btn.copied {
    background: linear-gradient(135deg, #128C7E, #075E54);
  }

  .hint {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    max-width: 420px;
  }
</style>
</head>
<body>

<div class="title-bar">
  <h1>🗳️ Voter Mapping Message</h1>
  <p>Copy karein aur WhatsApp pe paste karein — format exact rahega</p>
</div>

<div class="wa-box">
  <div class="wa-header">
    <span>💬</span>
    <div>
      <div class="wa-header-text">WhatsApp Ready Message</div>
      <div class="wa-header-sub">Copy → Paste → Send ✓</div>
    </div>
  </div>

  <div class="message-area">
    <textarea id="wa-message" rows="1" spellcheck="false" readonly>Maam meri mapping kariye 🙏

━━━━━━━━━━━━━━━━━━━━━━━
📋 *CURRENT VOTER DETAILS — 2024*
━━━━━━━━━━━━━━━━━━━━━━━

👤 Name         : Name
🏛️ Assembly No  : 138 Kalyan
📄 Yadi No      : 160
🔢 Sr No        : 93
🪪 Voter Card   : YFA9423120
📱 Mobile       : 

━━━━━━━━━━━━━━━━━━━━━━━
📜 *2002 VOTER DETAILS*
Self / Father / Mother / Grandparent
━━━━━━━━━━━━━━━━━━━━━━━

👤 Name         : Ismail Abdul Maniyar
🤝 Relation     : Father
🗺️ State        : Maharashtra
📍 District     : Thane
🏛️ Assembly     : Kalyan
📄 Yadi No      : 121
🔢 Sr No        : 80

━━━━━━━━━━━━━━━━━━━━━━━</textarea>
  </div>

  <button class="copy-btn" onclick="copyMessage()" id="copyBtn">
    <span id="btnIcon">📋</span>
    <span id="btnText">Copy Message</span>
  </button>
</div>

<p class="hint">💡 WhatsApp mein *text* bold dikhega — format bilkul same rahega</p>

<script>
  // Auto resize textarea
  const ta = document.getElementById('wa-message');
  ta.style.height = ta.scrollHeight + 'px';

  function copyMessage() {
    const text = document.getElementById('wa-message').value;
    const btn = document.getElementById('copyBtn');
    const icon = document.getElementById('btnIcon');
    const label = document.getElementById('btnText');

    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      icon.textContent = '✅';
      label.textContent = 'Copied! WhatsApp pe paste karein';
      setTimeout(() => {
        btn.classList.remove('copied');
        icon.textContent = '📋';
        label.textContent = 'Copy Message';
      }, 3000);
    }).catch(() => {
      // Fallback for older browsers
      ta.removeAttribute('readonly');
      ta.select();
      document.execCommand('copy');
      ta.setAttribute('readonly', '');
      icon.textContent = '✅';
      label.textContent = 'Copied!';
      setTimeout(() => {
        icon.textContent = '📋';
        label.textContent = 'Copy Message';
      }, 3000);
    });
  }
</script>

</body>
</html>
